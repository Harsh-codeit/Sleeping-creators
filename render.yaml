services:
  - type: web
    name: sleeping-creators-api
    runtime: python
    rootDir: .
    buildCommand: pip install -r backend_mobile/requirements.txt && pip install -e backend_mobile/
    startCommand: uvicorn backend_mobile.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false          # paste Atlas connection string in Render dashboard
      - key: DB_NAME
        value: sc_mobile
      - key: JWT_SECRET_KEY
        sync: false          # paste existing JWT secret (keeps users logged in)
      - key: ANTHROPIC_API_KEY
        sync: false          # paste your Anthropic API key
      - key: REDIS_URL
        value: ""            # leave blank — caching disabled without Redis
      - key: BUNDLE_API_KEY
        sync: false
      - key: R2_ACCOUNT_ID
        value: ""
      - key: R2_ACCESS_KEY_ID
        value: ""
      - key: R2_SECRET_ACCESS_KEY
        value: ""
      - key: R2_BUCKET_NAME
        value: ""
      - key: R2_PUBLIC_URL
        value: ""
      - key: SHOTSTACK_KEY
        sync: false          # paste Shotstack API key from dashboard
      - key: SHOTSTACK_ENV
        value: "stage"       # change to "production" to remove watermark + faster renders
