services:
  - type: web
    name: sleeping-creators-api
    runtime: python
    rootDir: .
    buildCommand: pip install -r backend_mobile/requirements.txt && pip install -e backend_mobile/
    startCommand: uvicorn backend_mobile.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false          # paste Atlas connection string in Render dashboard
      - key: DB_NAME
        value: sc_mobile
      - key: JWT_SECRET_KEY
        sync: false          # paste existing JWT secret (keeps users logged in)
      - key: ANTHROPIC_API_KEY
        sync: false          # paste your Anthropic API key
      - key: REDIS_URL
        sync: false          # paste Redis connection URL in Render dashboard
      - key: BUNDLE_API_KEY
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false          # Cloudflare R2 — set in Render dashboard (blank = no slide images)
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_PUBLIC_URL
        sync: false          # e.g. https://cdn.sleepingcreators.com
      - key: SHOTSTACK_KEY
        sync: false          # paste Shotstack API key from dashboard
      - key: SHOTSTACK_ENV
        value: "stage"       # change to "production" to remove watermark + faster renders
      - key: APIFY_API_KEY
        sync: false          # Apify token — reel analysis + competitor scraping (paid actor: keep the Apify account funded)
      - key: GOOGLE_DRIVE_API_KEY
        sync: false          # Google Cloud API key with Drive API v3 enabled — needed for Performance Library ingestion
      - key: APP_BASE_URL
        sync: false          # your Render URL e.g. https://sleeping-creators.onrender.com — used for Bundle OAuth redirect
